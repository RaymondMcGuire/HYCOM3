name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          VITE_APP_NAME: HYCOM3
          VITE_AUTH_TOKEN_TTL_MINUTES: "60"
          VITE_LC_APP_ID: ${{ secrets.VITE_LC_APP_ID }}
          VITE_LC_APP_KEY: ${{ secrets.VITE_LC_APP_KEY }}
          VITE_LC_SERVER_URL: ${{ secrets.VITE_LC_SERVER_URL }}
          VITE_LC_CLOUD_FUNCTIONS_ENABLED: "false"
          VITE_LC_USER_INFO_CLASS: UsrInfo
          VITE_LC_FEEDBACK_CLASS: MailForms
          VITE_EMAILJS_ENABLED: "false"

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
